# Nginx: api.onthewater.ru — редирект HTTP → HTTPS и прокси на бэкенд
#
# Установка на сервер:
#   1. Скопировать в /etc/nginx/sites-available/boatrent-api
#   2. Путь к uploads поправить при необходимости (сейчас /opt/boatrent/backend/uploads/)
#   3. Получить сертификат: sudo certbot certonly --standalone -d api.onthewater.ru
#      (временно: sudo systemctl stop nginx → certbot → sudo systemctl start nginx)
#      Либо: оставить только server на 80 с proxy_pass, затем sudo certbot --nginx -d api.onthewater.ru
#   4. Включить: sudo ln -sf /etc/nginx/sites-available/boatrent-api /etc/nginx/sites-enabled/
#   5. Проверка: sudo nginx -t && sudo systemctl reload nginx

# Редирект всего HTTP на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.onthewater.ru;
    return 301 https://$host$request_uri;
}

# HTTPS — API и статика uploads
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.onthewater.ru;

    ssl_certificate     /etc/letsencrypt/live/api.onthewater.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.onthewater.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 11M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /opt/boatrent/backend/uploads/;
    }
}
